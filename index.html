<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sachsenhausen Gids - Sheet Editie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; margin: 0; touch-action: manipulation; }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: #020617; border-bottom: 2px solid #1e293b; }
        .map-container { width: 100%; height: 200px; background: #fff; overflow: hidden; position: relative; cursor: zoom-in; }
        .map-img { width: 100%; height: 100%; object-fit: contain; }
        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 20px; }
        .loc-btn { aspect-ratio: 1/1; border-radius: 16px; font-weight: 900; font-size: 1.2rem; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; }
        .btn-long { background: #fbbf24; color: #000; border-color: #d97706; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4); }
        .btn-short { background: #3b82f6; color: #fff; border-color: #1d4ed8; }
        .btn-info { background: #1e293b; color: #94a3b8; border-color: #334155; }
        .overlay-view { position: fixed; inset: 0; background: #020617; z-index: 100; overflow-y: auto; padding: 20px; display: none; }
        .glass-card { background: rgba(15, 23, 42, 0.9); border-radius: 32px; padding: 32px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px; }
        .btn-finish { background: #f8fafc; color: #020617; width: 100%; padding: 22px; border-radius: 20px; font-weight: 900; font-size: 1.3rem; margin-top: 40px; border: none; }
        #loading-overlay { position: fixed; inset: 0; background: #020617; z-index: 300; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        #zoom-view { position: fixed; inset: 0; background: #000; z-index: 200; display: none; overflow: auto; }
        #zoom-img { width: 300%; max-width: none; background: #fff; }
    </style>
</head>
<body>

    <div id="loading-overlay">LADEN VAN GEGEVENS...</div>

    <div id="main-ui">
        <div class="sticky-header">
            <div class="p-4 flex justify-between items-center">
                <h1 class="font-black text-xl tracking-tighter">SACHSENHAUSEN</h1>
                <div class="flex gap-2">
                    <button onclick="showQR()" class="bg-slate-800 text-[10px] font-black px-4 py-2 rounded-full uppercase">Deel</button>
                    <button onclick="showGuide()" class="bg-blue-600 text-[10px] font-black px-4 py-2 rounded-full uppercase">Help</button>
                </div>
            </div>
            <div class="map-container" onclick="openZoom()">
                <img src="plattegrond_site_sachsenhausen.png" class="map-img" alt="Kaart">
            </div>
        </div>
        <div class="btn-grid" id="loc-grid"></div>
    </div>

    <div id="zoom-view" onclick="closeZoom()">
        <img src="plattegrond_site_sachsenhausen.png" id="zoom-img">
    </div>

    <div id="overlay" class="overlay-view"></div>

    <script>
        // PLAK HIER JE GEKOPIEERDE GOOGLE SHEET CSV LINK
        const SHEET_CSV_URL = 'VUL_HIER_JE_CSV_LINK_IN';

        let locations = {};

        async function loadData() {
            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    results.data.forEach(row => {
                        if (row.ID) {
                            locations[row.ID] = {
                                type: row.Type || 'info',
                                title: row.Title || `Locatie #${row.ID}`,
                                text: row.Text || '',
                                extra: row.Extra || '',
                                sources: row.Sources ? row.Sources.split(',') : [],
                                walking: row.Walking || ''
                            };
                        }
                    });
                    initApp();
                },
                error: function() {
                    alert("Fout bij laden van Google Sheet. Controleer je link.");
                }
            });
        }

        function initApp() {
            document.getElementById('loading-overlay').style.display = 'none';
            const grid = document.getElementById('loc-grid');
            grid.innerHTML = '';
            for(let i=1; i<=40; i++) {
                const loc = locations[i] || { type: 'info' };
                const btn = document.createElement('button');
                btn.className = `loc-btn btn-${loc.type}`;
                btn.innerText = i;
                btn.onclick = () => showDetail(i);
                grid.appendChild(btn);
            }
        }

        function showDetail(id) {
            const loc = locations[id] || { title: `Locatie #${id}`, text: "Nog geen tekst in sheet." };
            const ui = document.getElementById('overlay');
            ui.innerHTML = `
                <button onclick="closeOverlay()" class="mb-6 bg-slate-800 text-blue-400 font-bold px-6 py-4 rounded-full uppercase">← Kaart</button>
                <div class="glass-card">
                    <h2 class="text-4xl font-black mb-8">${loc.title} <span class="opacity-20 block text-8xl">#${id}</span></h2>
                    <div class="prose text-lg space-y-4">
                        <p>${loc.text}</p>
                        ${loc.extra ? `<div class="bg-blue-600/30 border-l-8 border-blue-500 p-6 italic rounded-r-3xl">${loc.extra}</div>` : ''}
                    </div>
                    ${loc.walking ? `<div class="bg-blue-600 p-6 rounded-2xl font-bold mt-8">ROUTE: ${loc.walking}</div>` : ''}
                    <button onclick="closeOverlay()" class="btn-finish">IK BEN KLAAR</button>
                </div>`;
            ui.style.display = 'block';
            ui.scrollTop = 0;
        }

        function openZoom() { document.getElementById('zoom-view').style.display = 'block'; }
        function closeZoom() { document.getElementById('zoom-view').style.display = 'none'; }
        function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }
        function showGuide() { /* ... Handleiding code ... */ }
        function showQR() { /* ... QR code ... */ }

        loadData();
    </script>
</body>
</html>
