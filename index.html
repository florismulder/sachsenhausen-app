<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sachsenhausen Gids - Sheet Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; margin: 0; touch-action: manipulation; }
        
        /* Sticky Header & Map */
        .sticky-header { position: sticky; top: 0; z-index: 50; background: #020617; border-bottom: 2px solid #1e293b; }
        .map-container { width: 100%; height: 210px; background: #fff; overflow: hidden; position: relative; cursor: zoom-in; }
        .map-img { width: 100%; height: 100%; object-fit: contain; }
        
        /* Buttons Grid */
        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; background: #020617; }
        .loc-btn { aspect-ratio: 1/1; border-radius: 14px; font-weight: 900; font-size: 1.2rem; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; transition: all 0.1s; }
        .loc-btn:active { transform: scale(0.9); opacity: 0.7; }

        /* Kleuren op basis van Type uit Sheet */
        .btn-long { background: #fbbf24; color: #000; border-color: #d97706; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4); }
        .btn-short { background: #3b82f6; color: #fff; border-color: #1d4ed8; }
        .btn-info { background: #1e293b; color: #94a3b8; border-color: #334155; }

        /* Overlay Views */
        .overlay-view { position: fixed; inset: 0; background: #020617; z-index: 100; overflow-y: auto; padding: 20px; display: none; }
        .glass-card { background: rgba(15, 23, 42, 0.95); border-radius: 32px; padding: 28px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-finish { background: #f8fafc; color: #020617; width: 100%; padding: 20px; border-radius: 20px; font-weight: 900; font-size: 1.2rem; margin-top: 30px; border: none; cursor: pointer; }
        
        /* Zoom Map */
        #zoom-view { position: fixed; inset: 0; background: #000; z-index: 200; display: none; overflow: auto; }
        #zoom-img { width: 300%; max-width: none; background: #fff; }

        /* Loading */
        #loading-overlay { position: fixed; inset: 0; background: #020617; z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; }
        .spinner { width: 40px; height: 40px; border: 4px solid #1e293b; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(25px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p class="tracking-widest uppercase text-xs">Gegevens synchroniseren...</p>
    </div>

    <div id="main-ui">
        <div class="sticky-header">
            <div class="p-4 flex justify-between items-center">
                <div>
                    <h1 class="font-black text-lg tracking-tighter leading-none">SACHSENHAUSEN</h1>
                    <p class="text-[9px] font-bold text-blue-400 uppercase tracking-[0.3em] mt-1">Live Database Gids</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="showQR()" class="bg-slate-800 text-[10px] font-black px-4 py-2 rounded-full uppercase">Deel</button>
                    <button onclick="showGuide()" class="bg-blue-600 text-[10px] font-black px-4 py-2 rounded-full uppercase">Help</button>
                </div>
            </div>
            <div class="map-container" onclick="openZoom()">
                <img src="plattegrond_site_sachsenhausen.png" class="map-img" alt="Kaart">
                <div class="absolute bottom-2 right-2 bg-black/70 px-2 py-1 rounded text-[8px] font-bold text-white uppercase tracking-widest">Tik voor Zoom</div>
            </div>
            <div class="px-6 py-2 flex justify-between bg-slate-900 text-[9px] font-black uppercase tracking-widest border-t border-slate-800">
                <span class="text-yellow-500">● Focus</span> <span class="text-blue-500">● Route</span> <span class="text-slate-500">● Info</span>
            </div>
        </div>
        <div class="btn-grid" id="loc-grid"></div>
    </div>

    <div id="zoom-view" onclick="closeZoom()">
        <img src="plattegrond_site_sachsenhausen.png" id="zoom-img">
        <div class="fixed top-6 left-1/2 -translate-x-1/2 bg-blue-600 px-8 py-4 rounded-full font-black text-white shadow-2xl uppercase tracking-widest text-sm">Sluit Kaart</div>
    </div>

    <div id="overlay" class="overlay-view"></div>

    <script>
        // Jouw unieke Google Sheet Link
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKELDoi2qq3h3QCJHsToUADFC8UirA4ghLsyDWPDmtBHzr55T4n9dHYojlzol8fweJBiJx-Rap5mo8/pub?output=csv';

        let locations = {};

        // Data inladen vanuit de Google Sheet
        async function loadData() {
            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    results.data.forEach(row => {
                        if (row.ID) {
                            locations[row.ID.trim()] = {
                                type: row.Type ? row.Type.trim().toLowerCase() : 'info',
                                title: row.Title || `Locatie #${row.ID}`,
                                text: row.Text || '',
                                extra: row.Extra || '',
                                sources: row.Sources ? row.Sources.split(',') : [],
                                walking: row.Walking || ''
                            };
                        }
                    });
                    buildInterface();
                },
                error: function() {
                    alert("Kan de gidsgegevens niet laden. Controleer je internetverbinding of de Google Sheet link.");
                }
            });
        }

        function buildInterface() {
            document.getElementById('loading-overlay').style.display = 'none';
            const grid = document.getElementById('loc-grid');
            grid.innerHTML = '';
            for(let i=1; i<=40; i++) {
                const loc = locations[i] || { type: 'info' };
                const btn = document.createElement('button');
                btn.className = `loc-btn btn-${loc.type}`;
                btn.innerText = i;
                btn.onclick = () => showDetail(i);
                grid.appendChild(btn);
            }
        }

        function showDetail(id) {
            const loc = locations[id] || { title: `Locatie #${id}`, text: "Nog geen informatie beschikbaar in de sheet voor dit punt." };
            const ui = document.getElementById('overlay');
            ui.innerHTML = `
                <button onclick="closeOverlay()" class="mb-6 bg-slate-800 text-blue-400 font-bold px-6 py-4 rounded-full uppercase text-xs tracking-widest border border-slate-700">← Kaart</button>
                <div class="glass-card animate-up">
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-3xl font-black text-white leading-tight">${loc.title}</h2>
                        <span class="text-slate-800 font-black text-7xl -mt-6 opacity-40">#${id}</span>
                    </div>
                    <div class="prose text-lg leading-relaxed text-slate-200 space-y-4 mb-10">
                        <p>${loc.text.replace(/\n/g, '<br>')}</p>
                        ${loc.extra ? `<div class="bg-blue-600/20 border-l-4 border-blue-500 p-4 italic text-sm text-blue-50 rounded-r-xl">${loc.extra}</div>` : ''}
                    </div>
                    ${loc.walking ? `<div class="bg-blue-600 p-5 rounded-2xl font-bold text-white text-sm shadow-lg">ROUTE: ${loc.walking}</div>` : ''}
                    <button onclick="closeOverlay()" class="btn-finish">IK BEN KLAAR</button>
                    ${loc.sources.length > 0 ? `<div class="mt-8 pt-6 border-t border-white/10 text-[10px] text-slate-500 uppercase font-bold tracking-widest">Bronnen: ${loc.sources.join(', ')}</div>` : ''}
                </div>`;
            ui.style.display = 'block';
            ui.scrollTop = 0; // Fix: altijd bovenaan de tekst starten
        }

        function openZoom() { document.getElementById('zoom-view').style.display = 'block'; }
        function closeZoom() { document.getElementById('zoom-view').style.display = 'none'; }
        function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }

        function showQR() {
            const ui = document.getElementById('overlay');
            ui.innerHTML = `
                <button onclick="closeOverlay()" class="mb-6 bg-slate-800 text-blue-400 font-black text-[10px] px-6 py-3 rounded-full uppercase tracking-widest border border-slate-700">← Sluiten</button>
                <div class="glass-card text-center animate-up">
                    <h2 class="text-2xl font-black mb-4 uppercase">Deel deze App</h2>
                    <div id="qrcode" class="mb-6 p-4 bg-white rounded-xl inline-block"></div>
                    <p class="text-[10px] text-slate-500 uppercase font-black break-all">${window.location.href}</p>
                    <button onclick="closeOverlay()" class="btn-finish">IK BEN KLAAR</button>
                </div>`;
            ui.style.display = 'block';
            ui.scrollTop = 0;
            setTimeout(() => {
                new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 200, height: 200 });
            }, 50);
        }

        function showGuide() {
            const ui = document.getElementById('overlay');
            ui.innerHTML = `
                <button onclick="closeOverlay()" class="mb-6 bg-slate-800 text-blue-400 font-bold text-xs px-6 py-3 rounded-full uppercase tracking-widest">← Terug</button>
                <div class="glass-card animate-up">
                    <h2 class="text-2xl font-black mb-6 uppercase tracking-tighter italic">Handleiding Gids</h2>
                    <div class="space-y-6 text-slate-200">
                        <section>
                            <h3 class="text-yellow-500 font-black text-xs uppercase mb-2">1. De Kleurcodes</h3>
                            <p class="text-sm">● <strong class="text-yellow-500">Goud:</strong> Focuspunten (2-5 min).<br>
                            ● <strong class="text-blue-500">Blauw:</strong> Routepunten (1 min).<br>
                            ● <strong class="text-slate-400">Grijs:</strong> Gebouw info (30 sec).</p>
                        </section>
                        <section>
                            <h3 class="text-yellow-500 font-black text-xs uppercase mb-2">2. Live Aanpassen</h3>
                            <p class="text-sm">Pas je teksten aan in de Google Sheet en herlaad deze pagina. De wijzigingen zijn direct zichtbaar.</p>
                        </section>
                    </div>
                    <button onclick="closeOverlay()" class="btn-finish">IK BEN KLAAR</button>
                </div>`;
            ui.style.display = 'block';
            ui.scrollTop = 0;
        }

        // Start het laden
        loadData();
    </script>
</body>
</html>
